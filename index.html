<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBurst - Focus Timer with Task Management</title>
    <meta
      name="description"
      content="Stay productive with TaskBurst. Track your focus sessions, manage tasks with visual progress grids, and celebrate achievements."
    />
    <meta name="author" content="Kommenszlapf" />
    
    <!-- Favicon - dynamic SVG that reads theme color -->
    <link rel="icon" type="image/svg+xml" href="./TaskBurst.svg" id="dynamic-favicon" />
    <link rel="apple-touch-icon" href="./TaskBurst.svg" />
    
    <script>
      // Dynamic favicon color based on theme - uses the original TaskBurst.svg with color filter
      function updateFavicon() {
        try {
          var settings = JSON.parse(localStorage.getItem('appSettings') || '{}');
          var themeColors = {
            'default': '#8b5cf6',
            'indigo': '#6366f1',
            'ocean': '#0ea5e9',
            'forest': '#22c55e',
            'sunset': '#f97316',
            'lavender': '#a855f7',
            'rose': '#ec4899',
            'amber': '#f59e0b',
            'slate': '#64748b',
          };
          var color = themeColors[settings.colorTheme] || '#8b5cf6';
          // Convert hex to RGB for SVG filter
          var r = parseInt(color.slice(1,3), 16) / 255;
          var g = parseInt(color.slice(3,5), 16) / 255;
          var b = parseInt(color.slice(5,7), 16) / 255;

          // Fetch original SVG and apply color
          fetch('/TaskBurst.svg')
            .then(function(res) { return res.text(); })
            .then(function(svgText) {
              // Insert a color matrix filter that maps all colors to the target color
              var filterDef = '<defs><filter id="recolor"><feColorMatrix type="matrix" values="0 0 0 0 ' + r + ' 0 0 0 0 ' + g + ' 0 0 0 0 ' + b + ' 0 0 0 1 0"/></filter></defs>';
              var colored = svgText.replace(/<svg([^>]*)>/, '<svg$1>' + filterDef + '<g filter="url(#recolor)">');
              colored = colored.replace(/<\/svg>/, '</g></svg>');
              var blob = new Blob([colored], {type: 'image/svg+xml'});
              var url = URL.createObjectURL(blob);
              var link = document.getElementById('dynamic-favicon');
              if (link) link.href = url;
            })
            .catch(function() {});
        } catch(e) {}
      }
      updateFavicon();
      window.addEventListener('appSettingsUpdated', updateFavicon);
      window.addEventListener('storage', updateFavicon);
    </script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TaskBurst" />
    <script type="module" crossorigin src="./assets/index-Dn6mc-QU.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CBcOUGQB.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
